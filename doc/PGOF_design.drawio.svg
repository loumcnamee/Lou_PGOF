        <!-- ═══════════════ ANNOTATION BOXES ═══════════════ -->
        <mxCell id="note1" value="&lt;b&gt;Time-Cycle Loop (repeats each tick)&lt;/b&gt;&lt;br&gt;1. Car(s) arrive → WaitQueue.enqueue(car)&lt;br&gt;2. WaitQueue.notify_observers(tick) → ParkingEngine.on_time_cycle(tick)&lt;br&gt;3. ParkingEngine calls IParkingAlgorithm.find_space() for each queued car&lt;br&gt;4. ParkingEngine unparks cars whose expiry_tick &amp;lt;= current tick&lt;br&gt;5. FeeCollector.record_parking() accumulates fee = car_size x wait_time&lt;br&gt;6. IReporter.report(SimulationStats) → ConsoleReporter or QtDashboardReporter" style="text;html=1;align=left;verticalAlign=top;spacingLeft=8;overflow=hidden;rotatable=0;fontSize=10;whiteSpace=wrap;strokeColor=#888888;fillColor=#ffffff;" vertex="1" parent="1">
          <mxGeometry x="20" y="590" width="760" height="120" as="geometry" />
        </mxCell>
        <mxCell id="note2" value="&lt;b&gt;SOLID Mapping&lt;/b&gt;&lt;br&gt;S — Car, ParkingSpace, FeeCollector, Garage each own one concern&lt;br&gt;O — New algorithms added via IParkingAlgorithm; ParkingEngine unchanged&lt;br&gt;L — FIFOAlgorithm / BestFitAlgorithm are substitutable implementations&lt;br&gt;I — ITimeCycleObserver, IReporter, IUserInterface keep contracts narrow&lt;br&gt;D — ParkingEngine depends on IParkingAlgorithm &amp;amp; IReporter abstractions" style="text;html=1;align=left;verticalAlign=top;spacingLeft=8;overflow=hidden;rotatable=0;fontSize=10;whiteSpace=wrap;strokeColor=#888888;fillColor=#ffffff;" vertex="1" parent="1">
          <mxGeometry x="800" y="590" width="490" height="120" as="geometry" />
        </mxCell>

